<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .add-note-btn {
            display: block;
            width: 200px;
            margin: 0 auto 30px;
            padding: 15px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .add-note-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .note {
            background: #fff9c4;
            border-radius: 10px;
            padding: 20px;
            min-height: 200px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .note:hover {
            transform: rotate(2deg) scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .note-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        .note-title::placeholder {
            color: #999;
        }

        .note-content {
            flex: 1;
            font-size: 1rem;
            color: #555;
            resize: none;
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-family: inherit;
            line-height: 1.5;
        }

        .note-content::placeholder {
            color: #999;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .note-date {
            font-size: 0.75rem;
            color: #888;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ee5a5a;
            transform: scale(1.1);
        }

        .note textarea {
            background: transparent;
        }

        .empty-message {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin-top: 50px;
        }

        /* Different colors for notes */
        .note:nth-child(6n+1) { background: #fff9c4; }
        .note:nth-child(6n+2) { background: #f8bbd0; }
        .note:nth-child(6n+3) { background: #c8e6c9; }
        .note:nth-child(6n+4) { background: #bbdefb; }
        .note:nth-child(6n+5) { background: #ffe0b2; }
        .note:nth-child(6n+6) { background: #e1bee7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Sticky Notes</h1>
        <button class="add-note-btn" onclick="createNote()">+ Add Note</button>
        <div class="notes-grid" id="notesGrid"></div>
        <p class="empty-message" id="emptyMessage">No notes yet! Click "Add Note" to create one.</p>
    </div>

    <script>
        // Load notes from localStorage on page load
        let notes = JSON.parse(localStorage.getItem('stickyNotes')) || [];

        function saveNotes() {
            localStorage.setItem('stickyNotes', JSON.stringify(notes));
        }

        function renderNotes() {
            const grid = document.getElementById('notesGrid');
            const emptyMsg = document.getElementById('emptyMessage');

            grid.innerHTML = '';

            if (notes.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';

            notes.forEach((note, index) => {
                const noteEl = document.createElement('div');
                noteEl.className = 'note';

                noteEl.innerHTML = `
                    <input type="text" class="note-title" placeholder="Title" 
                           value="${escapeHtml(note.title)}" 
                           onchange="updateNote(${index}, 'title', this.value)">
                    <textarea class="note-content" placeholder="Write your note here..." 
                              onchange="updateNote(${index}, 'content', this.value)">${escapeHtml(note.content)}</textarea>
                    <div class="note-footer">
                        <span class="note-date">${formatDate(note.date)}</span>
                        <button class="delete-btn" onclick="deleteNote(${index})">Delete</button>
                    </div>
                `;

                grid.appendChild(noteEl);
            });
        }

        function createNote() {
            const newNote = {
                title: '',
                content: '',
                date: new Date().toISOString()
            };
            notes.push(newNote);
            saveNotes();
            renderNotes();

            // Focus on the new note's title input
            setTimeout(() => {
                const inputs = document.querySelectorAll('.note-title');
                inputs[inputs.length - 1].focus();
            }, 100);
        }

        function updateNote(index, field, value) {
            notes[index][field] = value;
            notes[index].date = new Date().toISOString();
            saveNotes();
        }

        function deleteNote(index) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes.splice(index, 1);
                saveNotes();
                renderNotes();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Initial render
        renderNotes();
    </script>
</body>
</html>
